name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # Run tests on all three platforms
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Build UI (needed for go:embed)
        run: cd ui && npm ci && npm run build
      - name: Copy UI to static
        shell: bash
        run: rm -rf internal/core/api/static && cp -r ui/dist internal/core/api/static
      - name: Run tests
        run: go test ./... -v -count=1
      - name: Vet
        run: go vet ./...

  # Lint UI (only needs one OS)
  ui-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: cd ui && npm ci && npm run lint

  # Cross-compile for all target platforms
  build-matrix:
    needs: [test, ui-lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            name: macos-arm64
          - goos: darwin
            goarch: amd64
            name: macos-amd64
          - goos: windows
            goarch: amd64
            name: windows-amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            name: windows-arm64
            ext: .exe
          - goos: linux
            goarch: amd64
            name: linux-amd64
          - goos: linux
            goarch: arm64
            name: linux-arm64
          - goos: linux
            goarch: arm
            name: linux-armv7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Build UI
        run: cd ui && npm ci && npm run build
      - name: Copy UI to static
        run: rm -rf internal/core/api/static && cp -r ui/dist internal/core/api/static
      - name: Build
        run: go build -ldflags "-s -w" -o dist/biglybigly-${{ matrix.name }}${{ matrix.ext }} ./cmd/biglybigly
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
      - uses: actions/upload-artifact@v4
        with:
          name: biglybigly-${{ matrix.name }}
          path: dist/biglybigly-${{ matrix.name }}${{ matrix.ext }}

  # Build and test Docker image
  docker:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: biglybigly:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test container
        run: |
          docker run -d --name bigly-test -p 8082:8082 biglybigly:ci
          sleep 3
          curl -sf http://localhost:8082/api/modules | grep -q netmon
          docker stop bigly-test
