name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.22'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: go test ./...
      - run: go vet ./...
      - run: cd ui && npm install && npm run build && npm run lint

  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: darwin
            arch: arm64
            name: macos-arm64
          - os: darwin
            arch: amd64
            name: macos-amd64
          - os: windows
            arch: amd64
            name: windows-amd64
            ext: .exe
          - os: windows
            arch: arm64
            name: windows-arm64
            ext: .exe
          - os: linux
            arch: amd64
            name: linux-amd64
          - os: linux
            arch: arm64
            name: linux-arm64
          - os: linux
            arch: arm
            name: linux-armv7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.22'
      - run: go build -o dist/biglybigly-${{ matrix.name }}${{ matrix.ext }} ./cmd/biglybigly
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
      - uses: actions/upload-artifact@v3
        with:
          name: biglybigly-${{ matrix.name }}
          path: dist/biglybigly-${{ matrix.name }}${{ matrix.ext }}
